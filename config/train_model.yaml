# @package _global_
#########################################################
# Task-specific parameters
#########################################################
defaults:
  - _self_
  - path: relative
  - model: InceptionTime10
  - training: adamw_r_patient
  - dataset: SPPs_combined
  - transforms: tscHFNoise
  - loader: M

pretrain_checkpoint: null
seed: 0 # Seed for reproducibility
suffix: "" #_${now:%Y-%m-%d_%H-%M-%S.%f}
name: ${dataset.name}_${model.name}_${transforms.name}_${loader.name}_${training.name}__${seed}_${suffix}

#########################################################
# Hydraqol parameters (see modules/utils/hydraqol.py)
#########################################################
# Save directory for outputs
save_dir: ${path.base_path_models}/${name}
# Mode configuration (base, force, clean, check)
mode: base
# Retry configuration
retry:
  max_retries: 3
  delay: 5  # seconds

#########################################################
# Hydra parameters
#########################################################
hydra:
  run:
    dir: ${path.base_path}/outputs/${now:%Y-%m-%d_%H-%M-%S}_${hydra.job.name}
  sweep:
    dir: ${path.base_path}/outputs/${now:%Y-%m-%d_%H-%M-%S}_${hydra.job.name}
    subdir: ${hydra.job.num}
