[workspace]
name = "spp"
version = "0.1.0"
description = "SPP time-series models, Lightning training, and the FMDS activation viewer"
authors = ["SPP"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64"]

# ---------------------------------------------------------------------------
# Conda-provided base (Python + build basics). Everything else comes from PyPI
# so the pins match env_setup/requirements.txt exactly.
# ---------------------------------------------------------------------------
[dependencies]
python = "3.12.*"
pip = "*"
ipykernel = "*"  # so the env can be selected as a Jupyter/VS Code notebook kernel
# lightning / pytorch-lightning 2.5.1 require packaging<25; keep the conda solve in range.
packaging = ">=20,<25"

# ---------------------------------------------------------------------------
# CUDA PyTorch wheels (cu124) are pulled from the official PyTorch index using
# pixi's per-package `index` key. On a CPU-only box, drop the `index` entries
# (or point them at https://download.pytorch.org/whl/cpu).
# ---------------------------------------------------------------------------
[pypi-dependencies]
torch = { version = "==2.6.0", index = "https://download.pytorch.org/whl/cu124" }
torchvision = { version = "==0.21.0", index = "https://download.pytorch.org/whl/cu124" }
torchaudio = { version = "==2.6.0", index = "https://download.pytorch.org/whl/cu124" }

# Core data science
numpy = "==2.1.2"
pandas = "==2.2.3"

# Visualization / monitoring
matplotlib = "==3.10.1"
seaborn = "==0.13.2"
tensorboard = "==2.19.0"

# Deep learning framework
lightning = "==2.5.1"
pytorch-lightning = "==2.5.1"
torchmetrics = "==1.7.0"
datasets = "==3.5.0"

# Configuration & workflow
hydra-core = "==1.3.2"
hydra-joblib-launcher = "==1.2.0"
hydra-submitit-launcher = "==1.2.0"
hydra-ray-launcher = "==1.2.1"
pyyaml = "==6.0.2"
tqdm = "==4.67.1"

# XAI / activation viewer (ported from FMDS_XAI)
scikit-learn = "==1.6.1"
gradio = ">=5.0"
plotly = ">=5.20"
umap-learn = ">=0.5.6"

# Development environment
jupyterlab = "==4.3.6"

# ---------------------------------------------------------------------------
# Tasks: run with `pixi run <task>`
# ---------------------------------------------------------------------------
[tasks]
# Train the default SPP model (dataset=SPP5/SPP5s_DR model=InceptionTime10 ...)
train = "python runs/train.py"
# Aggregate run results into tables + plots
report = "python runs/report.py"
# Launch JupyterLab (open runs/nb_activation_viewer.ipynb)
lab = "jupyter lab"
# Run the SPP5 multirun sweep locally via the joblib launcher
sweep = "python runs/train.py --multirun +experiment=SPP5 +launcher=joblib"
