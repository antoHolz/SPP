name: adamw
seed: 0
device: cuda
task: ${dataset.task}
monitor_model_metrics: "model" # model, layerwise, none
monitor_model_steps: 10 # number of optim steps
compile: False

# basic configuration
loss:
  _target_: torch.nn.NLLLoss #torch.nn.MSELoss
optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-5
  weight_decay : 0.01
scheduler:
  _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
  mode: min
  factor: 0.1
  patience: 20

# Trainer configuration
trainer:
  _target_: lightning.pytorch.Trainer
  max_epochs: 100
  min_epochs: 10
  devices: -1
  accelerator: auto
  gradient_clip_val: 10.0
  deterministic: true
  enable_progress_bar: true
  enable_model_summary: true
  strategy: auto
  precision: 32
  #log_every_n_steps: 100
  #accumulate_grad_batches: 5

# Callbacks configuration
callbacks:
  model_checkpoint:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: ${save_dir}
    filename: 'best'
    save_weights_only: false
    save_top_k: 1
    monitor: 'val_loss'
    mode: 'min'
    save_last : true
  learning_rate_monitor:
    _target_: lightning.pytorch.callbacks.LearningRateMonitor
    logging_interval: 'epoch'
  #device_monitoring:
  #  _target_: lightning.pytorch.callbacks.DeviceStatsMonitor
  #  cpu_stats: true
  #timer:
  #  _target_: lightning.pytorch.callbacks.Timer
  early_stopping:
    _target_: lightning.pytorch.callbacks.EarlyStopping
    monitor: 'val_loss'
    patience: 15
    mode: 'min'
  #gradient_accumulation_scheduler:
  #  _target_: lightning.pytorch.callbacks.GradientAccumulationScheduler
  #  scheduling: {25: 4, 50: 8}
  #model_summary:
  #  _target_: lightning.pytorch.callbacks.ModelSummary
  #  max_depth: 1
  #model_ckeckpoint_epochs:
  #  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  #  dirpath: ${save_dir}
  #  filename: '{epoch:03d}'
  #  every_n_epochs: 1
  #  save_weights_only: false
  #model_ckeckpoint_steps:
  #  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  #  dirpath: ${save_dir}
  #  filename: '{steps:03d}'
  #  every_n_steps: 20
  #  save_weights_only: false
  
# Metrics to log
metrics:
  acc:
    _target_: torchmetrics.Accuracy
    task: multiclass
    num_classes: ${dataset.n_classes}
    num_labels: ${dataset.n_classes}
  # cm:
  #   _target_: torchmetrics.ConfusionMatrix
  #   task: multiclass
  #   num_classes: ${dataset.n_classes}
  #   num_labels: ${dataset.n_classes}
  f1:
    _target_: torchmetrics.F1Score
    task: multiclass
    num_classes: ${dataset.n_classes}
    num_labels: ${dataset.n_classes}
  # mse:
  #   _target_: torchmetrics.MeanSquaredError
  # mae:
  #   _target_: torchmetrics.MeanAbsoluteError
  # mape:
  #   _target_: torchmetrics.MeanAbsolutePercentageError
  # rmse:
  #   _target_: torchmetrics.MeanSquaredError
    # squared: False
  #r2:
  #  _target_: torchmetrics.R2Score
  # rse:
  #   _target_: torchmetrics.RelativeSquaredError

# Loggers configuration
loggers:
  tensorboard:
    _target_: lightning.pytorch.loggers.tensorboard.TensorBoardLogger
    save_dir: ${save_dir}
    name: tb
  csv:
    _target_: lightning.pytorch.loggers.csv_logs.CSVLogger
    save_dir: ${save_dir}
    name: csv
